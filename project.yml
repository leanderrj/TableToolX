name: TableToolX
options:
  bundleIdPrefix: com.leanderrj
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    MACOSX_DEPLOYMENT_TARGET: "14.0"
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: 2.9.4
targets:
  TableToolCore:
    type: framework
    platform: macOS
    sources:
      - path: TableToolCore/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.leanderrj.TableToolCore
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        DEFINES_MODULE: YES
        OTHER_LDFLAGS: -lsqlite3
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -O
          SWIFT_COMPILATION_MODE: wholemodule
  TableToolX:
    type: application
    platform: macOS
    sources:
      - path: TableToolX/Sources
      - path: TableToolX/Resources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - target: TableToolCore
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.leanderrj.TableToolX
        PRODUCT_NAME: Table Tool X
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: TableToolX/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: TableToolX/Resources/TableToolX.entitlements
        MARKETING_VERSION: 1.3.0
        CURRENT_PROJECT_VERSION: 9
    postBuildScripts: []
  TableToolCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TableToolCore/Tests
    dependencies:
      - target: TableToolCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.leanderrj.TableToolXTests
schemes:
  TableToolX:
    build:
      targets:
        TableToolX: all
        TableToolCoreTests: [test]
    test:
      targets:
        - TableToolCoreTests
