name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: macOS ${{ matrix.macos }} / Xcode ${{ matrix.xcode-version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - macos: "14"
            runner: macos-14
            xcode: /Applications/Xcode_16.2.app
            xcode-version: "16.2"
          - macos: "15"
            runner: macos-15
            xcode: /Applications/Xcode_16.4.app
            xcode-version: "16.4"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install XcodeGen
        run: brew install xcodegen actionlint
      - name: Lint automation
        run: actionlint -color
      - name: Select Xcode
        run: sudo xcode-select -s "${{ matrix.xcode }}"
      - name: Generate project
        run: xcodegen generate
      - name: Test
        run: >-
          xcodebuild test
          -project TableToolX.xcodeproj
          -scheme TableToolX
          -destination 'platform=macOS'
          CODE_SIGNING_ALLOWED=NO
      - name: Verify universal release build
        if: matrix.macos == '15'
        shell: bash
        run: |
          derived_data="$RUNNER_TEMP/TableToolXUniversal"
          xcodebuild build \
            -project TableToolX.xcodeproj \
            -scheme TableToolX \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath "$derived_data" \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO
          executable="$derived_data/Build/Products/Release/Table Tool X.app/Contents/MacOS/Table Tool X"
          architectures=$(lipo -archs "$executable")
          [[ "$architectures" == *arm64* && "$architectures" == *x86_64* ]]
      - name: Dry-run release packaging and Sparkle appcast
        if: matrix.macos == '15'
        shell: bash
        run: |
          derived_data="$RUNNER_TEMP/TableToolXUniversal"
          built_app="$derived_data/Build/Products/Release/Table Tool X.app"
          sparkle_tools="$derived_data/SourcePackages/artifacts/sparkle/Sparkle/bin"
          package_dir="$RUNNER_TEMP/release-dry-run"
          appcast_dir="$package_dir/appcast"
          mkdir -p "$appcast_dir"
          app="$package_dir/Table Tool X.app"
          ditto "$built_app" "$app"
          openssl genpkey -algorithm Ed25519 -outform DER -out "$package_dir/private.der"
          ephemeral_private_key=$(tail -c 32 "$package_dir/private.der" | base64 | tr -d '\n')
          ephemeral_public_key=$(openssl pkey -inform DER -in "$package_dir/private.der" -pubout -outform DER | tail -c 32 | base64 | tr -d '\n')
          plutil -replace SUPublicEDKey -string "$ephemeral_public_key" "$app/Contents/Info.plist"
          codesign --force --deep --sign - "$app"
          version=1.3.0
          archive="$appcast_dir/TableToolX-$version.zip"
          ditto -c -k --sequesterRsrc --keepParent "$app" "$archive"
          printf '%s' "$ephemeral_private_key" | "$sparkle_tools/generate_appcast" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/leanderrj/TableToolX/releases/download/v$version/" \
            -o "$appcast_dir/appcast.xml" \
            "$appcast_dir"
          grep -q 'sparkle:edSignature=' "$appcast_dir/appcast.xml"
          unzip -t "$archive"
          sha256=$(shasum -a 256 "$archive" | awk '{print $1}')
          sed \
            -e "s/__VERSION__/$version/g" \
            -e "s/__SHA256__/$sha256/g" \
            .github/homebrew/table-tool-x.rb.in > "$package_dir/table-tool-x.rb"
          ruby -c "$package_dir/table-tool-x.rb"
          tap_name="tabletoolx/release-audit-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          tap_path=$(brew --repository "$tap_name")
          cleanup() { brew untap "$tap_name" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          brew tap-new "$tap_name" >/dev/null
          mkdir -p "$tap_path/Casks"
          cp "$package_dir/table-tool-x.rb" "$tap_path/Casks/table-tool-x.rb"
          brew style --cask "$tap_path/Casks/table-tool-x.rb"
          brew audit --cask "$tap_name/table-tool-x"
