name: Bug report
description: Report incorrect behavior, crashes, or data fidelity problems.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thank you. Remove private data from examples before submitting them.
  - type: input
    id: version
    attributes:
      label: Table Tool X version
      placeholder: 1.3.0 (build 9)
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version and Mac
      placeholder: macOS 15.5, Apple M2
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: What happened?
      description: Include exact steps, expected behavior, and actual behavior.
    validations:
      required: true
  - type: textarea
    id: dialect
    attributes:
      label: File format
      description: State encoding, delimiter, quote/escape style, line ending, header setting, and approximate size if relevant.
      placeholder: UTF-8, comma, double quote with doubled-quote escaping, LF, header, 2 GB
  - type: textarea
    id: fixture
    attributes:
      label: Minimal anonymized sample
      description: Paste only the smallest safe fixture that reproduces the issue. Do not include customer or personal data.
      render: text
  - type: checkboxes
    id: integrity
    attributes:
      label: Data safety
      options:
        - label: I kept a backup of the affected file.
          required: true
        - label: This report contains no secrets, customer data, or personal information.
          required: true
